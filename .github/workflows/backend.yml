name: backend

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: System deps (ffmpeg for scenedetect/opencv)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libgl1
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff mypy
      - name: Ruff
        run: ruff check .
      - name: Mypy (advisory — will be enforced after plan #4)
        run: mypy . || true
      - name: Pytest
        env:
          DATABASE_URL: "sqlite:///./ci.db"
          SECRET_KEY: "ci-test-key-not-for-prod"
          REQUIRE_DB_MIGRATIONS: "false"
        run: pytest -q
