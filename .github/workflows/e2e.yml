name: e2e

on:
  pull_request:
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/e2e.yml"
  push:
    branches: [main]

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: flowcut
          POSTGRES_PASSWORD: flowcut
          POSTGRES_DB: flowcut
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flowcut"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: System deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libgl1
      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: frontend
        run: npm run e2e:install
      - name: Run backend migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg2://flowcut:flowcut@localhost:5432/flowcut
        run: alembic upgrade head
      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg2://flowcut:flowcut@localhost:5432/flowcut
          SECRET_KEY: e2e-secret-thirty-two-chars-min-abcd
          CORS_ORIGINS: http://localhost:3000
          REQUIRE_DB_MIGRATIONS: "false"
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          for i in {1..30}; do curl -fsS http://127.0.0.1:8000/healthz && break; sleep 1; done
      - name: Run Playwright
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: npm run e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
