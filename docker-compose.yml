services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    ports:
      - "127.0.0.1:6379:6379"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flowcut
      POSTGRES_PASSWORD: flowcut
      POSTGRES_DB: flowcut
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowcut"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5432:5432"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://flowcut:flowcut@db:5432/flowcut
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      APP_ENV: ${APP_ENV:-development}
      APP_VERSION: ${APP_VERSION:-dev}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - backend_storage:/app/backend/data

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://flowcut:flowcut@db:5432/flowcut
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      APP_ENV: ${APP_ENV:-development}
      APP_VERSION: ${APP_VERSION:-dev}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_storage:/app/backend/data
    command: ["celery", "-A", "workers.celery_app", "worker", "--loglevel=info", "--concurrency=2"]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file: .env
    environment:
      NEXT_PUBLIC_APP_ENV: ${APP_ENV:-development}
      NEXT_PUBLIC_APP_VERSION: ${APP_VERSION:-dev}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  db_data:
  backend_storage:
